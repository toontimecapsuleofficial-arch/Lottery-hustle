<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monster Rush</title>
<style>
  /* ============ RESET & BASE ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #07070d;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    color: #f3e7d3;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body { position: fixed; inset: 0; }

  /* ============ GAME CONTAINER ============ */
  #game-container {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, #3a1d3f 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 80%, #1a0d2a 0%, transparent 60%),
      linear-gradient(180deg, #14091e 0%, #07070d 100%);
  }
  #bg-canvas, #game-canvas, #fx-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #bg-canvas { z-index: 1; opacity: 0.55; }
  #game-canvas { z-index: 2; }
  #fx-canvas { z-index: 3; pointer-events: none; }

  /* ============ SCREEN OVERLAYS ============ */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50;
    background: radial-gradient(ellipse at center, rgba(15,8,25,0.85) 0%, rgba(7,7,13,0.96) 70%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: opacity 0.4s ease, visibility 0.4s ease;
    padding: 24px;
  }
  .screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  /* ============ MAIN MENU ============ */
  #menu-screen { gap: 18px; }
  .logo-wrap {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 18px rgba(255, 90, 50, 0.4));
  }
  #logo-img {
    width: min(80vw, 460px); height: auto;
    image-rendering: auto;
  }
  .tagline {
    font-size: 13px; letter-spacing: 6px; text-transform: uppercase;
    color: #ff8a5c; margin-top: -8px; opacity: 0.9;
    text-shadow: 0 0 12px rgba(255, 138, 92, 0.6);
  }

  .menu-buttons { display: flex; flex-direction: column; gap: 12px; width: min(86vw, 320px); }
  .menu-btn {
    position: relative;
    background: linear-gradient(180deg, rgba(60, 30, 70, 0.8), rgba(30, 15, 40, 0.9));
    border: 1.5px solid rgba(255, 140, 80, 0.35);
    color: #ffe8d0;
    padding: 14px 22px;
    font-size: 17px; font-weight: bold; letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    overflow: hidden;
    font-family: inherit;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }
  .menu-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 40%, rgba(255,180,100,0.18) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }
  .menu-btn:hover { transform: translateY(-2px); border-color: rgba(255, 170, 100, 0.8); box-shadow: 0 6px 24px rgba(255, 100, 50, 0.25); }
  .menu-btn:hover::before { transform: translateX(100%); }
  .menu-btn:active { transform: translateY(0); }
  .menu-btn.primary {
    background: linear-gradient(180deg, #ff7a3d 0%, #d9482a 100%);
    border-color: #ffa873;
    color: #fff;
    box-shadow: 0 4px 22px rgba(255, 100, 50, 0.45), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .menu-btn.primary:hover { box-shadow: 0 8px 30px rgba(255, 100, 50, 0.6), inset 0 1px 0 rgba(255,255,255,0.3); }
  .menu-btn.secondary { font-size: 14px; padding: 10px 18px; opacity: 0.85; }
  .menu-btn.danger { border-color: rgba(255, 80, 80, 0.4); color: #ffb0a0; }
  .menu-btn.danger:hover { border-color: rgba(255, 100, 100, 0.8); box-shadow: 0 6px 20px rgba(255, 50, 50, 0.3); }

  .stats-display {
    display: flex; gap: 24px; margin-top: 14px;
    font-size: 13px; color: #b8a89a; letter-spacing: 1px;
  }
  .stats-display b { color: #ffce80; font-size: 16px; }

  .credits-text {
    font-size: 11px; color: #7a6c5e; letter-spacing: 2px; margin-top: 24px;
    text-align: center; line-height: 1.6;
  }

  /* ============ HUD ============ */
  #hud {
    position: absolute; inset: 0; z-index: 10;
    pointer-events: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #hud.hidden { display: none; }

  .hud-top {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: none;
  }

  .stats-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(15, 8, 25, 0.55);
    border: 1px solid rgba(255, 140, 80, 0.18);
    border-radius: 10px;
    padding: 6px 10px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: bold;
    color: #ffe8d0;
  }
  .stat-pill .icon {
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .stat-pill .icon svg { width: 100%; height: 100%; }
  .stat-pill.coins { color: #ffd24a; }
  .stat-pill.wave { color: #ff8a5c; }
  .stat-pill.level { color: #7adfff; }

  .top-right-buttons {
    position: absolute; top: 10px; right: 10px;
    display: flex; gap: 6px;
    pointer-events: auto;
  }
  .icon-btn {
    width: 38px; height: 38px;
    background: rgba(15, 8, 25, 0.6);
    border: 1px solid rgba(255, 140, 80, 0.25);
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #ffe8d0;
  }
  .icon-btn:hover { background: rgba(40, 20, 50, 0.8); border-color: rgba(255, 170, 100, 0.5); }
  .icon-btn svg { width: 20px; height: 20px; }

  /* Player health & XP bars */
  .player-bars {
    position: absolute;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    width: min(420px, 80vw);
    display: flex; flex-direction: column; gap: 4px;
    pointer-events: none;
  }
  .bar-container {
    position: relative;
    height: 14px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 140, 80, 0.3);
    border-radius: 8px;
    overflow: hidden;
  }
  .bar-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    transition: width 0.25s ease;
    border-radius: 7px;
  }
  .bar-fill.hp {
    background: linear-gradient(180deg, #ff5a5a 0%, #c92020 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 8px rgba(255, 50, 50, 0.4);
  }
  .bar-fill.xp {
    background: linear-gradient(180deg, #6fdfff 0%, #2a8fc9 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 8px rgba(50, 180, 255, 0.4);
  }
  .bar-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: bold; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.9);
    letter-spacing: 1px;
  }

  /* Boss health bar */
  .boss-bar {
    position: absolute;
    bottom: 130px; left: 50%;
    transform: translateX(-50%);
    width: min(560px, 92vw);
    display: none;
    flex-direction: column; gap: 4px;
    pointer-events: none;
  }
  .boss-bar.active { display: flex; animation: bossBarIn 0.5s ease; }
  @keyframes bossBarIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  .boss-bar .bar-container { height: 18px; border-color: rgba(255, 80, 80, 0.6); }
  .boss-bar .bar-fill {
    background: linear-gradient(180deg, #ff3a3a 0%, #8a0a0a 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 14px rgba(255, 30, 30, 0.6);
  }
  .boss-name {
    text-align: center;
    font-size: 14px; font-weight: bold;
    color: #ff7a7a; letter-spacing: 4px; text-transform: uppercase;
    text-shadow: 0 0 12px rgba(255, 50, 50, 0.7);
  }

  /* Skill bar */
  .skill-bar {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    pointer-events: auto;
    padding: 6px 10px;
    background: rgba(15, 8, 25, 0.45);
    border: 1px solid rgba(255, 140, 80, 0.2);
    border-radius: 14px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .skill-slot {
    position: relative;
    width: 52px; height: 52px;
    background: rgba(30, 15, 40, 0.7);
    border: 1.5px solid rgba(255, 140, 80, 0.3);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .skill-slot:hover { border-color: rgba(255, 180, 100, 0.7); transform: translateY(-2px); }
  .skill-slot.locked { opacity: 0.35; cursor: not-allowed; }
  .skill-slot.locked:hover { transform: none; }
  .skill-slot.ready { box-shadow: 0 0 12px rgba(255, 140, 80, 0.4); }
  .skill-icon {
    position: absolute; inset: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .skill-icon img { width: 100%; height: 100%; object-fit: contain; image-rendering: auto; }
  .skill-cd {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    pointer-events: none;
  }
  .skill-key {
    position: absolute; top: 2px; right: 4px;
    font-size: 9px; color: #ffce80;
    background: rgba(0,0,0,0.5);
    padding: 1px 4px; border-radius: 4px;
    font-weight: bold;
  }
  .skill-slot.ready .skill-key { color: #fff; background: rgba(255, 120, 60, 0.7); }

  /* ============ UPGRADE PANEL ============ */
  #upgrade-panel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(94vw, 460px);
    max-height: 88vh;
    overflow-y: auto;
    background: linear-gradient(180deg, rgba(25, 12, 35, 0.97) 0%, rgba(15, 8, 25, 0.97) 100%);
    border: 1.5px solid rgba(255, 140, 80, 0.35);
    border-radius: 16px;
    padding: 18px;
    z-index: 45;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 100, 50, 0.15);
    pointer-events: auto;
    display: none;
  }
  #upgrade-panel.active { display: block; animation: panelIn 0.3s ease; }
  @keyframes panelIn { from { transform: translate(-50%, -45%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255, 140, 80, 0.18);
  }
  .panel-title {
    font-size: 18px; font-weight: bold; letter-spacing: 3px;
    color: #ffce80; text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255, 180, 100, 0.4);
  }
  .panel-close {
    width: 32px; height: 32px;
    background: rgba(40, 20, 50, 0.7);
    border: 1px solid rgba(255, 140, 80, 0.3);
    border-radius: 8px;
    color: #ffe8d0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.15s ease;
  }
  .panel-close:hover { background: rgba(80, 30, 50, 0.8); }

  .upgrade-coins {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 14px;
    padding: 8px 12px;
    background: rgba(255, 200, 50, 0.08);
    border: 1px solid rgba(255, 200, 50, 0.25);
    border-radius: 10px;
    font-size: 16px; font-weight: bold; color: #ffd24a;
  }
  .upgrade-coins svg { width: 18px; height: 18px; }

  .upgrade-list { display: flex; flex-direction: column; gap: 10px; }
  .upgrade-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: rgba(40, 20, 50, 0.5);
    border: 1px solid rgba(255, 140, 80, 0.18);
    border-radius: 12px;
    transition: all 0.15s ease;
  }
  .upgrade-item:hover { border-color: rgba(255, 170, 100, 0.4); background: rgba(50, 25, 60, 0.6); }
  .upgrade-icon {
    width: 42px; height: 42px;
    background: rgba(20, 10, 30, 0.6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #ffce80;
  }
  .upgrade-icon svg { width: 24px; height: 24px; }
  .upgrade-info { flex: 1; min-width: 0; }
  .upgrade-name { font-size: 14px; font-weight: bold; color: #ffe8d0; margin-bottom: 2px; }
  .upgrade-desc { font-size: 11px; color: #a89888; }
  .upgrade-level { font-size: 11px; color: #7adfff; margin-top: 2px; }
  .upgrade-buy {
    padding: 8px 12px;
    background: linear-gradient(180deg, #ff7a3d, #d9482a);
    border: 1px solid #ffa873;
    border-radius: 8px;
    color: #fff; font-weight: bold; font-size: 13px;
    cursor: pointer; transition: all 0.15s ease;
    white-space: nowrap;
    font-family: inherit;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .upgrade-buy:hover { filter: brightness(1.15); }
  .upgrade-buy:disabled {
    background: rgba(50, 30, 40, 0.6);
    border-color: rgba(120, 80, 80, 0.4);
    color: #8a7868; cursor: not-allowed;
    box-shadow: none;
  }

  /* ============ GAME OVER SCREEN ============ */
  #gameover-screen { gap: 16px; }
  .gameover-title {
    font-size: clamp(36px, 8vw, 56px);
    font-weight: bold; letter-spacing: 6px;
    color: #ff4a4a;
    text-shadow: 0 0 24px rgba(255, 50, 50, 0.6), 0 4px 8px rgba(0,0,0,0.7);
    text-transform: uppercase;
    animation: gameoverPulse 2s ease-in-out infinite;
  }
  @keyframes gameoverPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  .gameover-stats {
    display: flex; flex-direction: column; gap: 10px;
    background: rgba(20, 10, 30, 0.7);
    border: 1px solid rgba(255, 140, 80, 0.25);
    border-radius: 14px;
    padding: 18px 28px;
    width: min(86vw, 360px);
  }
  .gameover-stat {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px;
  }
  .gameover-stat .label { color: #b8a89a; letter-spacing: 1px; }
  .gameover-stat .value { color: #ffce80; font-weight: bold; font-size: 18px; }

  /* ============ PAUSE OVERLAY ============ */
  #pause-overlay {
    position: absolute; inset: 0; z-index: 40;
    background: rgba(7, 7, 13, 0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    pointer-events: auto;
  }
  #pause-overlay.active { display: flex; }
  .pause-title {
    font-size: 38px; font-weight: bold; letter-spacing: 8px;
    color: #ffce80; text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255, 180, 100, 0.5);
  }

  /* ============ TOAST NOTIFICATIONS ============ */
  #toast-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 60;
    pointer-events: none;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }
  .toast {
    background: rgba(20, 10, 30, 0.9);
    border: 1.5px solid rgba(255, 170, 100, 0.5);
    color: #ffe8d0;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px; font-weight: bold;
    letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(255, 100, 50, 0.3);
    animation: toastIn 0.4s ease, toastOut 0.4s ease 1.6s forwards;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }
  .toast.skill { border-color: rgba(120, 220, 255, 0.6); color: #b8eaff; box-shadow: 0 4px 20px rgba(50, 180, 255, 0.3); }
  .toast.boss { border-color: rgba(255, 80, 80, 0.6); color: #ffb0b0; box-shadow: 0 4px 20px rgba(255, 30, 30, 0.4); font-size: 16px; }
  .toast.levelup { border-color: rgba(255, 220, 100, 0.7); color: #ffe890; box-shadow: 0 4px 24px rgba(255, 200, 50, 0.4); font-size: 16px; }
  @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toastOut { to { transform: translateY(-30px); opacity: 0; } }

  /* ============ MOBILE ADJUSTMENTS ============ */
  @media (max-width: 640px) {
    .skill-slot { width: 46px; height: 46px; }
    .stat-pill { font-size: 12px; }
    .icon-btn { width: 34px; height: 34px; }
    .player-bars { top: 56px; }
    .boss-bar { bottom: 120px; }
  }
  @media (max-height: 500px) and (orientation: landscape) {
    .skill-bar { bottom: 6px; }
    .player-bars { top: 50px; width: min(380px, 60vw); }
    .boss-bar { bottom: 80px; }
  }

  /* Scrollbar styling */
  #upgrade-panel::-webkit-scrollbar { width: 6px; }
  #upgrade-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  #upgrade-panel::-webkit-scrollbar-thumb { background: rgba(255, 140, 80, 0.4); border-radius: 3px; }

  /* Loading indicator */
  #loading {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #07070d;
    gap: 18px;
    transition: opacity 0.5s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 50px; height: 50px;
    border: 4px solid rgba(255, 140, 80, 0.2);
    border-top-color: #ff8a5c;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: #b8a89a; letter-spacing: 3px; text-transform: uppercase; }

  /* Asset fallback - placeholder when image fails */
  .asset-fallback {
    background: linear-gradient(135deg, #ff7a3d, #d9482a);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold;
  }
</style>
</head>
<body>
<div id="game-container">
  <!-- Background canvas (for bg.png or animated bg) -->
  <canvas id="bg-canvas"></canvas>
  <!-- Main game canvas (player, enemies, projectiles) -->
  <canvas id="game-canvas"></canvas>
  <!-- Effects canvas (particles, damage numbers, etc.) -->
  <canvas id="fx-canvas"></canvas>

  <!-- Loading screen -->
  <div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-top">
      <div class="stats-row">
        <div class="stat-pill wave">
          <span class="icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 12c2-5 4-5 6 0s4 5 6 0 4-5 6 0 4 5 6 0v3c-2 5-4 5-6 0s-4-5-6 0-4 5-6 0-4-5-6 0v-3z"/></svg></span>
          <span>Wave <span id="hud-wave">1</span></span>
        </div>
        <div class="stat-pill level">
          <span class="icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg></span>
          <span>LV <span id="hud-level">1</span></span>
        </div>
        <div class="stat-pill coins">
          <span class="icon"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><text x="12" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="currentColor">$</text></svg></span>
          <span id="hud-coins">0</span>
        </div>
      </div>
    </div>

    <div class="top-right-buttons">
      <button class="icon-btn" id="mute-btn" title="Mute">
        <svg id="mute-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </button>
      <button class="icon-btn" id="pause-btn" title="Pause">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
      </button>
      <button class="icon-btn" id="upgrade-btn" title="Upgrades">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l-2 5h-5l4 3-1.5 5L12 12l4.5 3L15 10l4-3h-5l-2-5z"/></svg>
      </button>
    </div>

    <!-- Player health/XP bars -->
    <div class="player-bars">
      <div class="bar-container">

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Main Menu -->
  <div id="menu-screen" class="screen">
    <div class="logo-wrap">
      <img id="logo-img" alt="Monster Rush" src="assets/logo.png">

      <div class="gameover-stat"><span class="label">Player Level</span><span class="value" id="go-level">1</span></div>

<script>
/* ============================================================
   MONSTER RUSH - Single-file HTML5 Auto-Battle Survival Game
   ============================================================ */

(() => {
'use strict';

/* ============================================================
   1. UTILITIES & HELPERS
   ============================================================ */

const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (mn, mx) => mn + Math.random() * (mx - mn);
const randInt = (mn, mx) => Math.floor(rand(mn, mx + 1));
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const TAU = Math.PI * 2;

/* Simple Audio system using Web Audio API (no external assets) */
const Audio = {
  ctx: null,
  master: null,
  muted: false,
  init() {
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.35;
      this.master.connect(this.ctx.destination);
    } catch (e) { this.ctx = null; }
  },
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  play(type, freq = 440, dur = 0.1, vol = 0.3) {
    if (this.muted || !this.ctx) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(g); g.connect(this.master);
    osc.start(now); osc.stop(now + dur);
  },
  hit() { this.play('square', 180 + Math.random() * 40, 0.06, 0.18); },
  crit() { this.play('square', 380, 0.12, 0.25); },
  die() { this.play('triangle', 120, 0.18, 0.2); this.play('triangle', 80, 0.22, 0.15); },
  coin() { this.play('sine', 880, 0.06, 0.18); this.play('sine', 1320, 0.08, 0.12); },
  levelup() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this.play('triangle', f, 0.18, 0.22), i * 80)); },
  skill() { this.play('sawtooth', 220, 0.2, 0.2); this.play('sine', 660, 0.2, 0.15); },
  boss() { this.play('sawtooth', 90, 0.4, 0.3); this.play('square', 60, 0.5, 0.25); },
  gameover() { [440, 330, 220, 110].forEach((f, i) => setTimeout(() => this.play('triangle', f, 0.3, 0.25), i * 200)); },
  heal() { this.play('sine', 660, 0.15, 0.2); this.play('sine', 990, 0.2, 0.15); }
};

/* ============================================================
   2. ASSET LOADING
   ============================================================ */

const ASSET_LIST = [
  'player', 'enemy1', 'enemy2', 'enemy3', 'boss',
  'fireball', 'iceblast', 'lightning', 'heal', 'rage',
  'coin', 'gem', 'attackeffect', 'explosion', 'levelup',
  'logo', 'playbutton', 'upgradebutton', 'chest', 'bg'
];

const Assets = {
  images: {},
  loaded: 0,
  total: 0,
  ready: false,
  load(callback) {
    this.total = ASSET_LIST.length;
    let finished = 0;
    const onDone = () => {
      finished++;
      this.loaded = finished;
      if (finished >= this.total) {
        this.ready = true;
        callback();
      } else if (finished >= 3) {
        // Allow start after at least a few assets load (avoid blocking forever)
        callback();
      }
    };
    ASSET_LIST.forEach(name => {
      const img = new Image();
      img.onload = () => { this.images[name] = img; onDone(); };
      img.onerror = () => { this.images[name] = null; onDone(); }; // null = use fallback
      img.src = `assets/${name}.png`;
    });
    // Safety: if assets don't load in 4s, force continue
    setTimeout(() => { if (!this.ready) { this.ready = true; callback(); } }, 4000);
  },
  get(name) { return this.images[name] || null; }
};

/* ============================================================
   3. CANVAS SETUP & RESIZE
   ============================================================ */

const bgCanvas = document.getElementById('bg-canvas');
const gameCanvas = document.getElementById('game-canvas');
const fxCanvas = document.getElementById('fx-canvas');
const bgCtx = bgCanvas.getContext('2d');
const gameCtx = gameCanvas.getContext('2d');
const fxCtx = fxCanvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
let bgPattern = null;

function resizeCanvas() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  [bgCanvas, gameCanvas, fxCanvas].forEach(c => {
    c.width = W * DPR;
    c.height = H * DPR;
    c.style.width = W + 'px';
    c.style.height = H + 'px';
    c.getContext('2d').setTransform(DPR, 0, 0, DPR, 0, 0);
  });
  drawBackground();
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

/* Draw static background using bg.png or fallback gradient */
function drawBackground() {
  bgCtx.clearRect(0, 0, W, H);
  const bgImg = Assets.get('bg');
  if (bgImg) {
    // Tile the background image
    const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    const scale = Math.max(W / iw, H / ih);
    const dw = iw * scale, dh = ih * scale;
    bgCtx.drawImage(bgImg, (W - dw) / 2, (H - dh) / 2, dw, dh);
  } else {
    // Fallback: dark gradient with subtle pattern
    const grad = bgCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H));
    grad.addColorStop(0, '#2a1530');
    grad.addColorStop(0.6, '#150a1f');
    grad.addColorStop(1, '#07070d');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, W, H);
    // Subtle grid
    bgCtx.strokeStyle = 'rgba(255, 140, 80, 0.04)';
    bgCtx.lineWidth = 1;
    const gs = 60;
    for (let x = 0; x < W; x += gs) { bgCtx.beginPath(); bgCtx.moveTo(x, 0); bgCtx.lineTo(x, H); bgCtx.stroke(); }
    for (let y = 0; y < H; y += gs) { bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(W, y); bgCtx.stroke(); }
  }
}

/* ============================================================
   4. GAME STATE
   ============================================================ */

const State = {
  // Game flow
  running: false,
  paused: false,
  gameOver: false,
  inMenu: true,

  // Time
  time: 0,
  dt: 0,
  lastTime: 0,

  // Player & entities
  player: null,
  enemies: [],
  projectiles: [],
  pickups: [],
  particles: [],
  floatingTexts: [],
  effects: [],

  // Wave system
  wave: 1,
  waveEnemiesToSpawn: 0,
  waveSpawnTimer: 0,
  waveSpawnInterval: 0.8,
  waveActive: false,
  waveBreakTimer: 0,
  bossActive: false,
  boss: null,

  // Stats
  coins: 0,
  coinsEarnedThisRun: 0,
  kills: 0,
  xp: 0,
  xpNeeded: 50,
  level: 1,

  // Skills cooldowns (in seconds, 0 = ready)
  skillCD: { fireball: 0, iceblast: 0, lightning: 0, heal: 0, rage: 0 },
  skillMaxCD: { fireball: 6, iceblast: 9, lightning: 12, heal: 15, rage: 20 },
  rageTimer: 0,

  // Screen shake
  shakeAmount: 0,
  shakeTimer: 0,

  // Spawn animation timer (for "Wave X" toasts)
  waveAnnounced: false,

  // Save data
  save: {
    coins: 0,
    highestWave: 1,
    playerLevel: 1,
    upgrades: { damage: 0, health: 0, speed: 0, crit: 0, critDmg: 0 }
  }
};

/* ============================================================
   5. SAVE / LOAD
   ============================================================ */

const SAVE_KEY = 'monsterRush_save_v1';

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      Object.assign(State.save, data);
      if (!State.save.upgrades) State.save.upgrades = { damage: 0, health: 0, speed: 0, crit: 0, critDmg: 0 };
    }
  } catch (e) { /* ignore */ }
  State.coins = State.save.coins;
  State.level = State.save.playerLevel;
}

function saveProgress() {
  State.save.coins = State.coins;
  State.save.playerLevel = State.level;
  if (State.wave > State.save.highestWave) State.save.highestWave = State.wave;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(State.save)); } catch (e) {}
}

function resetProgress() {
  State.save = { coins: 0, highestWave: 1, playerLevel: 1, upgrades: { damage: 0, health: 0, speed: 0, crit: 0, critDmg: 0 } };
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  State.coins = 0;
  State.level = 1;
  updateMenuStats();
}

/* ============================================================
   6. PLAYER
   ============================================================ */

class Player {
  constructor() {
    this.x = W / 2;
    this.y = H / 2;
    this.radius = 22;
    this.targetX = this.x;
    this.targetY = this.y;

    // Stats (base + upgrades)
    this.recalculateStats();

    this.hp = this.maxHp;
    this.attackTimer = 0;
    this.facing = 0;
    this.hitFlash = 0;
    this.levelUpFlash = 0;
    this.invuln = 0;
    this.bobTime = 0;
  }

  recalculateStats() {
    const u = State.save.upgrades;
    this.damage = 10 + u.damage * 4 + (State.level - 1) * 2;
    this.maxHp = 100 + u.health * 25 + (State.level - 1) * 8;
    this.attackSpeed = 1.0 + u.speed * 0.12 + (State.level - 1) * 0.02;
    this.critChance = 0.1 + u.crit * 0.04;
    this.critDamage = 1.5 + u.critDmg * 0.2;
    this.attackRange = 380;
    this.pickupRange = 100;
  }

  update(dt) {
    this.bobTime += dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.levelUpFlash > 0) this.levelUpFlash -= dt;
    if (this.invuln > 0) this.invuln -= dt;

    // Slight idle bob
    this.y = H / 2 + Math.sin(this.bobTime * 1.8) * 3;

    // Auto-attack nearest enemy
    this.attackTimer -= dt;
    const target = this.findNearestEnemy();
    if (target) {
      this.facing = Math.atan2(target.y - this.y, target.x - this.x);
      if (this.attackTimer <= 0) {
        this.attack(target);
        this.attackTimer = 1 / this.attackSpeed;
      }
    } else {
      this.attackTimer = Math.min(this.attackTimer, 0.1);
    }
  }

  findNearestEnemy() {
    let best = null, bestD = Infinity;
    for (const e of State.enemies) {
      if (e.dead) continue;
      const d = dist(this, e);
      if (d < bestD && d < this.attackRange) { bestD = d; best = e; }
    }
    return best;
  }

  attack(target) {
    const isCrit = Math.random() < this.critChance;
    let dmg = this.damage * (isCrit ? this.critDamage : 1);
    if (State.rageTimer > 0) dmg *= 1.8;
    dmg = Math.round(dmg);

    // Create projectile
    State.projectiles.push(new Projectile(this.x, this.y, target, dmg, isCrit, 'attackeffect'));

    // Attack flash
    this.hitFlash = 0.12;
    if (isCrit) Audio.crit(); else Audio.hit();
  }

  takeDamage(amount) {
    if (this.invuln > 0 || State.gameOver) return;
    this.hp -= amount;
    this.hitFlash = 0.25;
    this.invuln = 0.4;
    shake(6, 0.2);
    spawnFloatingText(this.x, this.y - 30, '-' + amount, '#ff5050', 16);
    if (this.hp <= 0) {
      this.hp = 0;
      triggerGameOver();
    }
  }

  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount);
    spawnFloatingText(this.x, this.y - 30, '+' + amount, '#50ff80', 18);
    Audio.heal();
  }

  gainXP(amount) {
    State.xp += amount;
    while (State.xp >= State.xpNeeded) {
      State.xp -= State.xpNeeded;
      State.level++;
      State.xpNeeded = Math.floor(50 * Math.pow(1.18, State.level - 1));
      this.recalculateStats();
      this.hp = this.maxHp; // Full heal on level up
      this.levelUpFlash = 1.0;
      spawnEffect('levelup', this.x, this.y);
      Audio.levelup();
      showToast('LEVEL UP!', 'levelup');
      saveProgress();
    }
  }

  draw(ctx) {
    const img = Assets.get('player');
    const flashAlpha = this.hitFlash > 0 ? Math.min(1, this.hitFlash * 3) : 0;
    const lvlAlpha = this.levelUpFlash > 0 ? this.levelUpFlash : 0;

    // Level-up aura
    if (lvlAlpha > 0) {
      ctx.save();
      ctx.globalAlpha = lvlAlpha * 0.7;
      const grad = ctx.createRadialGradient(this.x, this.y, 10, this.x, this.y, 80);
      grad.addColorStop(0, 'rgba(255, 230, 120, 0.8)');
      grad.addColorStop(1, 'rgba(255, 200, 50, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 80, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    // Pickup range aura (subtle)
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#ffce80';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.pickupRange, 0, TAU);
    ctx.stroke();
    ctx.restore();

    // Player sprite
    ctx.save();
    ctx.translate(this.x, this.y);
    const size = 56;
    if (img) {
      ctx.drawImage(img, -size/2, -size/2 - 6, size, size);
    } else {
      // Fallback: circle with face
      ctx.fillStyle = '#5a8fd0';
      ctx.beginPath();
      ctx.arc(0, 0, 22, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-7, -3, 4, 0, TAU);
      ctx.arc(7, -3, 4, 0, TAU);
      ctx.fill();
    }

    // Hit flash overlay
    if (flashAlpha > 0) {
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = `rgba(255, 80, 80, ${flashAlpha})`;
      ctx.fillRect(-size/2, -size/2 - 6, size, size);
    }
    ctx.restore();

    // Rage aura
    if (State.rageTimer > 0) {
      ctx.save();
      ctx.globalAlpha = 0.4 + Math.sin(State.time * 12) * 0.15;
      ctx.strokeStyle = '#ff5050';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 28 + Math.sin(State.time * 8) * 3, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }
}

/* ============================================================
   7. ENEMIES
   ============================================================ */

const ENEMY_TYPES = {
  grunt: { hp: 25, dmg: 8, speed: 60, radius: 18, coinMin: 1, coinMax: 2, xp: 8, asset: 'enemy1', color: '#a04060' },
  runner: { hp: 18, dmg: 6, speed: 110, radius: 15, coinMin: 1, coinMax: 3, xp: 10, asset: 'enemy2', color: '#c060a0' },
  tank: { hp: 70, dmg: 14, speed: 35, radius: 24, coinMin: 3, coinMax: 6, xp: 18, asset: 'enemy3', color: '#704080' },
  boss: { hp: 800, dmg: 30, speed: 28, radius: 50, coinMin: 80, coinMax: 140, xp: 200, asset: 'boss', color: '#ff3030' }
};

class Enemy {
  constructor(type, x, y, waveScale = 1) {
    const def = ENEMY_TYPES[type];
    this.type = type;
    this.x = x;
    this.y = y;
    this.radius = def.radius;
    this.maxHp = Math.round(def.hp * waveScale);
    this.hp = this.maxHp;
    this.damage = def.dmg * Math.sqrt(waveScale);
    this.speed = def.speed;
    this.coinMin = def.coinMin;
    this.coinMax = def.coinMax;
    this.xpReward = def.xp;
    this.asset = def.asset;
    this.color = def.color;
    this.dead = false;
    this.hitFlash = 0;
    this.bobTime = Math.random() * 10;
    this.attackCD = 0;
    this.isBoss = (type === 'boss');
    this.spawnAnim = 0.4;
    this.slowed = 0;
    this.facing = 0;
  }

  update(dt) {
    if (this.dead) return;
    if (this.spawnAnim > 0) { this.spawnAnim -= dt; return; }
    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.slowed > 0) this.slowed -= dt;
    if (this.attackCD > 0) this.attackCD -= dt;

    this.bobTime += dt;
    const p = State.player;
    const dx = p.x - this.x, dy = p.y - this.y;
    const d = Math.hypot(dx, dy) || 1;
    this.facing = Math.atan2(dy, dx);

    // Move toward player
    const moveRange = this.radius + p.radius - 4;
    if (d > moveRange) {
      const sp = this.speed * (this.slowed > 0 ? 0.45 : 1);
      this.x += (dx / d) * sp * dt;
      this.y += (dy / d) * sp * dt;
    } else if (this.attackCD <= 0) {
      // Attack player
      p.takeDamage(Math.round(this.damage));
      this.attackCD = 1.0;
      this.hitFlash = 0.2;
    }

    // Boss passive aura - shake periodically
    if (this.isBoss && Math.random() < 0.02) shake(2, 0.1);
  }

  takeDamage(amount, isCrit = false) {
    this.hp -= amount;
    this.hitFlash = 0.15;
    spawnFloatingText(
      this.x + rand(-10, 10),
      this.y - this.radius,
      amount.toString(),
      isCrit ? '#ffce40' : '#ffffff',
      isCrit ? 22 : 14
    );
    if (this.hp <= 0) this.die();
  }

  die() {
    if (this.dead) return;
    this.dead = true;
    State.kills++;
    spawnEffect('explosion', this.x, this.y, this.isBoss ? 1.5 : 1);
    Audio.die();

    // Drop coins
    const coinCount = randInt(this.coinMin, this.coinMax);
    for (let i = 0; i < coinCount; i++) {
      const ang = rand(0, TAU);
      const r = rand(0, 30);
      State.pickups.push(new Pickup('coin', this.x + Math.cos(ang) * r, this.y + Math.sin(ang) * r));
    }
    // Chance to drop gem
    if (Math.random() < (this.isBoss ? 1 : 0.05)) {
      State.pickups.push(new Pickup('gem', this.x, this.y));
    }

    // XP
    State.player.gainXP(this.xpReward);

    // Boss death rewards
    if (this.isBoss) {
      State.bossActive = false;
      State.boss = null;
      shake(20, 0.6);
      showToast('BOSS DEFEATED!', 'boss');
      // Extra coin burst
      for (let i = 0; i < 20; i++) {
        const ang = rand(0, TAU);
        const r = rand(0, 50);
        State.pickups.push(new Pickup('coin', this.x + Math.cos(ang) * r, this.y + Math.sin(ang) * r));
      }
    }
  }

  draw(ctx) {
    if (this.dead) return;
    const img = Assets.get(this.asset);
    const spawnScale = this.spawnAnim > 0 ? 1 - this.spawnAnim / 0.4 : 1;
    const bob = Math.sin(this.bobTime * 4) * 2;

    ctx.save();
    ctx.translate(this.x, this.y + bob);
    ctx.scale(spawnScale, spawnScale);

    // Shadow under enemy
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, this.radius - 4, this.radius * 0.8, this.radius * 0.3, 0, 0, TAU);
    ctx.fill();

    const size = this.radius * 2.4;
    if (img) {
      ctx.drawImage(img, -size/2, -size/2, size, size);
    } else {
      // Fallback
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0, 0, this.radius, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-this.radius * 0.3, -2, 3, 0, TAU);
      ctx.arc(this.radius * 0.3, -2, 3, 0, TAU);
      ctx.fill();
    }

    // Hit flash
    if (this.hitFlash > 0) {
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, this.hitFlash * 4)})`;
      ctx.fillRect(-size/2, -size/2, size, size);
    }
    ctx.restore();

    // HP bar (above enemy) - only if damaged
    if (this.hp < this.maxHp && this.spawnAnim <= 0) {
      const barW = this.isBoss ? 0 : Math.max(30, this.radius * 2);
      if (!this.isBoss) {
        const barH = 4;
        const bx = this.x - barW / 2;
        const by = this.y - this.radius - 10;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
        ctx.fillStyle = '#ff4040';
        ctx.fillRect(bx, by, barW * (this.hp / this.maxHp), barH);
      }
    }

    // Slow effect tint
    if (this.slowed > 0) {
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#60c0ff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 2, 0, TAU);
      ctx.fill();
      ctx.restore();
    }
  }
}

/* ============================================================
   8. PROJECTILES
   ============================================================ */

class Projectile {
  constructor(x, y, target, damage, isCrit, asset) {
    this.x = x;
    this.y = y;
    this.target = target;
    this.damage = damage;
    this.isCrit = isCrit;
    this.asset = asset;
    this.speed = 700;
    this.dead = false;
    this.life = 1.5;
    this.angle = 0;
    // Pre-compute direction toward target
    const dx = target.x - x, dy = target.y - y;
    this.angle = Math.atan2(dy, dx);
  }

  update(dt) {
    this.life -= dt;
    if (this.life <= 0) { this.dead = true; return; }
    if (!this.target || this.target.dead) {
      // Continue in last direction briefly
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;
      if (this.x < -50 || this.x > W + 50 || this.y < -50 || this.y > H + 50) this.dead = true;
      return;
    }
    const dx = this.target.x - this.x, dy = this.target.y - this.y;
    const d = Math.hypot(dx, dy);
    this.angle = Math.atan2(dy, dx);
    if (d < this.target.radius + 6) {
      this.target.takeDamage(this.damage, this.isCrit);
      this.dead = true;
      // Hit effect
      spawnEffect('attackeffect', this.x, this.y, 0.7);
    } else {
      this.x += (dx / d) * this.speed * dt;
      this.y += (dy / d) * this.speed * dt;
    }
  }

  draw(ctx) {
    const img = Assets.get(this.asset);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    const size = 22;
    if (img) {
      ctx.drawImage(img, -size/2, -size/2, size, size);
    } else {
      ctx.fillStyle = '#ffce80';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }
}

/* Skill projectile (Fireball, Ice Blast, Lightning) */
class SkillProjectile {
  constructor(type, x, y, targetX, targetY, damage) {
    this.type = type;
    this.x = x;
    this.y = y;
    this.targetX = targetX;
    this.targetY = targetY;
    this.damage = damage;
    this.speed = type === 'lightning' ? 1200 : 500;
    this.dead = false;
    this.life = 1.2;
    this.angle = Math.atan2(targetY - y, targetX - x);
    this.aoe = type === 'fireball' ? 80 : type === 'iceblast' ? 60 : 50;
    this.pierced = new Set();
  }

  update(dt) {
    this.life -= dt;
    if (this.life <= 0) { this.explode(); return; }
    const dx = this.targetX - this.x, dy = this.targetY - this.y;
    const d = Math.hypot(dx, dy);
    if (d < 12) { this.explode(); return; }
    this.x += (dx / d) * this.speed * dt;
    this.y += (dy / d) * this.speed * dt;
    this.angle = Math.atan2(dy, dx);

    // Trail particles
    if (this.type === 'fireball') {
      spawnParticle(this.x, this.y, rand(-20, 20), rand(-20, 20), '#ff7030', 0.4, 4);
    } else if (this.type === 'iceblast') {
      spawnParticle(this.x, this.y, rand(-15, 15), rand(-15, 15), '#80d0ff', 0.4, 3);
    } else if (this.type === 'lightning') {
      spawnParticle(this.x, this.y, rand(-30, 30), rand(-30, 30), '#ffee80', 0.3, 5);
    }
  }

  explode() {
    if (this.dead) return;
    this.dead = true;
    spawnEffect('explosion', this.x, this.y, this.type === 'fireball' ? 1.2 : 0.9);
    Audio.skill();
    shake(this.type === 'fireball' ? 8 : 5, 0.2);
    // AoE damage
    for (const e of State.enemies) {
      if (e.dead) continue;
      const d = dist(this, e);
      if (d < this.aoe + e.radius) {
        e.takeDamage(this.damage, false);
        if (this.type === 'iceblast') e.slowed = 3;
      }
    }
  }

  draw(ctx) {
    const img = Assets.get(this.type);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    const size = this.type === 'fireball' ? 32 : this.type === 'iceblast' ? 28 : 36;
    if (img) {
      ctx.drawImage(img, -size/2, -size/2, size, size);
    } else {
      const colors = { fireball: '#ff5030', iceblast: '#80d0ff', lightning: '#ffee80' };
      ctx.fillStyle = colors[this.type];
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }
}

/* ============================================================
   9. PICKUPS (coins, gems)
   ============================================================ */

class Pickup {
  constructor(type, x, y) {
    this.type = type; // 'coin' or 'gem'
    this.x = x;
    this.y = y;
    this.vx = rand(-80, 80);
    this.vy = rand(-100, -40);
    this.life = 0;
    this.value = type === 'coin' ? 1 : 25;
    this.collected = false;
    this.collectAnim = 0;
    this.bobTime = Math.random() * 10;
  }

  update(dt) {
    this.life += dt;
    this.bobTime += dt;

    if (this.collected) {
      // Fly toward player
      this.collectAnim += dt;
      const p = State.player;
      const dx = p.x - this.x, dy = p.y - this.y;
      const d = Math.hypot(dx, dy) || 1;
      const speed = 600 + this.collectAnim * 800;
      this.x += (dx / d) * speed * dt;
      this.y += (dy / d) * speed * dt;
      if (d < 20 || this.collectAnim > 0.5) {
        // Collected
        State.coins += this.value;
        State.coinsEarnedThisRun += this.value;
        Audio.coin();
        spawnFloatingText(p.x, p.y - 35, '+' + this.value, this.type === 'gem' ? '#80ffff' : '#ffd24a', 12);
        this.dead = true;
      }
      return;
    }

    // Gravity & friction initially
    if (this.life < 0.4) {
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.vy += 280 * dt;
      this.vx *= 0.92;
    } else {
      // Settle, check for pickup
      const p = State.player;
      const d = dist(this, p);
      if (d < p.pickupRange) {
        this.collected = true;
      }
      // Magnet pull when close
      if (d < p.pickupRange * 1.5) {
        const dx = p.x - this.x, dy = p.y - this.y;
        const dd = Math.hypot(dx, dy) || 1;
        this.x += (dx / dd) * 220 * dt;
        this.y += (dy / dd) * 220 * dt;
      }
    }

    // Expire after long time
    if (this.life > 15) this.dead = true;
  }

  draw(ctx) {
    const img = Assets.get(this.type);
    const bob = Math.sin(this.bobTime * 5) * 2;
    ctx.save();
    ctx.translate(this.x, this.y + bob);
    const size = this.type === 'gem' ? 22 : 16;
    // Glow
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = this.type === 'gem' ? '#40e0ff' : '#ffd24a';
    ctx.beginPath();
    ctx.arc(0, 0, size, 0, TAU);
    ctx.fill();
    ctx.globalAlpha = 1;
    if (img) {
      ctx.drawImage(img, -size/2, -size/2, size, size);
    } else {
      ctx.fillStyle = this.type === 'gem' ? '#40e0ff' : '#ffd24a';
      ctx.beginPath();
      ctx.arc(0, 0, size/2, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }
}

/* ============================================================
   10. PARTICLES & FLOATING TEXT & EFFECTS
   ============================================================ */

function spawnParticle(x, y, vx, vy, color, life, size) {
  State.particles.push({ x, y, vx, vy, color, life, maxLife: life, size, dead: false });
}

function spawnFloatingText(x, y, text, color, size) {
  State.floatingTexts.push({ x, y, text, color, size, life: 1, vy: -50, dead: false });
}

function spawnEffect(type, x, y, scale = 1) {
  State.effects.push({ type, x, y, scale, life: type === 'levelup' ? 1.2 : 0.5, maxLife: type === 'levelup' ? 1.2 : 0.5, dead: false });
}

function shake(amount, duration) {
  if (amount > State.shakeAmount) {
    State.shakeAmount = amount;
    State.shakeTimer = duration;
  }
}

/* ============================================================
   11. WAVE SYSTEM
   ============================================================ */

function startWave(n) {
  State.wave = n;
  State.waveActive = true;
  State.waveAnnounced = false;
  State.bossActive = false;

  if (n % 5 === 0) {
    // Boss wave
    State.waveEnemiesToSpawn = 1;
    State.waveSpawnInterval = 1;
    showToast(`WAVE ${n} — BOSS`, 'boss');
    Audio.boss();
    shake(12, 0.6);
  } else {
    State.waveEnemiesToSpawn = 4 + Math.floor(n * 1.4);
    State.waveSpawnInterval = Math.max(0.3, 0.9 - n * 0.02);
    showToast(`WAVE ${n}`, 'skill');
  }
  State.waveSpawnTimer = 0.5;
  updateHUD();
}

function spawnEnemy() {
  // Choose spawn position on screen edge
  const side = randInt(0, 3);
  let x, y;
  const margin = 60;
  if (side === 0) { x = rand(0, W); y = -margin; }
  else if (side === 1) { x = W + margin; y = rand(0, H); }
  else if (side === 2) { x = rand(0, W); y = H + margin; }
  else { x = -margin; y = rand(0, H); }

  const isBossWave = State.wave % 5 === 0;
  if (isBossWave) {
    const e = new Enemy('boss', x, y, 1 + (State.wave / 5 - 1) * 0.6);
    State.enemies.push(e);
    State.boss = e;
    State.bossActive = true;
  } else {
    // Choose enemy type based on wave
    let type;
    const r = Math.random();
    if (State.wave < 3) {
      type = 'grunt';
    } else if (State.wave < 6) {
      type = r < 0.7 ? 'grunt' : 'runner';
    } else if (State.wave < 10) {
      type = r < 0.5 ? 'grunt' : r < 0.8 ? 'runner' : 'tank';
    } else {
      type = r < 0.35 ? 'grunt' : r < 0.65 ? 'runner' : 'tank';
    }
    const waveScale = 1 + (State.wave - 1) * 0.15;
    State.enemies.push(new Enemy(type, x, y, waveScale));
  }
}

function updateWaves(dt) {
  if (!State.waveActive) {
    State.waveBreakTimer -= dt;
    if (State.waveBreakTimer <= 0) {
      startWave(State.wave + 1);
    }
    return;
  }

  // Spawn enemies
  if (State.waveEnemiesToSpawn > 0) {
    State.waveSpawnTimer -= dt;
    if (State.waveSpawnTimer <= 0) {
      spawnEnemy();
      State.waveEnemiesToSpawn--;
      State.waveSpawnTimer = State.waveSpawnInterval;
    }
  } else {
    // Check if all enemies dead
    const aliveCount = State.enemies.filter(e => !e.dead).length;
    if (aliveCount === 0) {
      State.waveActive = false;
      State.waveBreakTimer = 2.5;
      saveProgress();
      // Heal player a bit between waves
      State.player.hp = Math.min(State.player.maxHp, State.player.hp + State.player.maxHp * 0.1);
    }
  }
}

/* ============================================================
   12. SKILLS
   ============================================================ */

const SKILL_DEFS = [
  { id: 'fireball', name: 'Fireball', key: '1', unlockLevel: 1, desc: 'Explosive AoE' },
  { id: 'iceblast', name: 'Ice Blast', key: '2', unlockLevel: 3, desc: 'Slows enemies' },
  { id: 'lightning', name: 'Lightning', key: '3', unlockLevel: 5, desc: 'Fast strike' },
  { id: 'heal', name: 'Heal', key: '4', unlockLevel: 7, desc: 'Restore HP' },
  { id: 'rage', name: 'Rage', key: '5', unlockLevel: 10, desc: '+80% damage' }
];

function castSkill(id) {
  if (State.skillCD[id] > 0 || State.gameOver || State.paused) return;
  const def = SKILL_DEFS.find(s => s.id === id);
  if (State.level < def.unlockLevel) return;

  const p = State.player;
  const target = p.findNearestEnemy();
  let tx = target ? target.x : p.x + Math.cos(p.facing) * 200;
  let ty = target ? target.y : p.y + Math.sin(p.facing) * 200;

  if (id === 'fireball') {
    State.projectiles.push(new SkillProjectile('fireball', p.x, p.y, tx, ty, p.damage * 3));
  } else if (id === 'iceblast') {
    State.projectiles.push(new SkillProjectile('iceblast', p.x, p.y, tx, ty, p.damage * 2));
  } else if (id === 'lightning') {
    State.projectiles.push(new SkillProjectile('lightning', p.x, p.y, tx, ty, p.damage * 2.5));
  } else if (id === 'heal') {
    p.heal(Math.round(p.maxHp * 0.35));
    spawnEffect('heal', p.x, p.y);
  } else if (id === 'rage') {
    State.rageTimer = 8;
    spawnEffect('rage', p.x, p.y);
    showToast('RAGE!', 'skill');
  }

  State.skillCD[id] = State.skillMaxCD[id];
  Audio.skill();
  updateSkillBar();
}

function updateSkills(dt) {
  let changed = false;
  for (const id in State.skillCD) {
    if (State.skillCD[id] > 0) {
      State.skillCD[id] = Math.max(0, State.skillCD[id] - dt);
      changed = true;
    }
  }
  if (State.rageTimer > 0) State.rageTimer -= dt;
  if (changed) updateSkillBar();
}

/* ============================================================
   13. UPDATE LOOP
   ============================================================ */

function update(dt) {
  if (!State.running || State.paused || State.gameOver) return;

  State.time += dt;

  // Player
  State.player.update(dt);

  // Enemies
  for (const e of State.enemies) e.update(dt);
  // Remove dead enemies
  State.enemies = State.enemies.filter(e => !e.dead);

  // Projectiles
  for (const p of State.projectiles) p.update(dt);
  State.projectiles = State.projectiles.filter(p => !p.dead);

  // Pickups
  for (const p of State.pickups) p.update(dt);
  State.pickups = State.pickups.filter(p => !p.dead);

  // Particles
  for (const p of State.particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) p.dead = true;
  }
  State.particles = State.particles.filter(p => !p.dead);

  // Floating text
  for (const t of State.floatingTexts) {
    t.y += t.vy * dt;
    t.vy *= 0.95;
    t.life -= dt;
    if (t.life <= 0) t.dead = true;
  }
  State.floatingTexts = State.floatingTexts.filter(t => !t.dead);

  // Effects
  for (const e of State.effects) {
    e.life -= dt;
    if (e.life <= 0) e.dead = true;
  }
  State.effects = State.effects.filter(e => !e.dead);

  // Waves
  updateWaves(dt);

  // Skills
  updateSkills(dt);

  // Shake
  if (State.shakeTimer > 0) {
    State.shakeTimer -= dt;
    if (State.shakeTimer <= 0) State.shakeAmount = 0;
  }

  // Update HUD
  updateHUD();
}

/* ============================================================
   14. RENDERING
   ============================================================ */

function render() {
  // Clear game canvas
  gameCtx.clearRect(0, 0, W, H);
  fxCtx.clearRect(0, 0, W, H);

  // Apply screen shake
  let sx = 0, sy = 0;
  if (State.shakeAmount > 0) {
    const t = State.shakeTimer;
    const amt = State.shakeAmount * (t > 0 ? t / 0.3 : 0);
    sx = rand(-amt, amt);
    sy = rand(-amt, amt);
  }
  gameCtx.save();
  gameCtx.translate(sx, sy);
  fxCtx.save();
  fxCtx.translate(sx, sy);

  // Draw pickups (under enemies)
  for (const p of State.pickups) p.draw(gameCtx);

  // Draw enemies
  for (const e of State.enemies) e.draw(gameCtx);

  // Draw player
  if (State.player) State.player.draw(gameCtx);

  // Draw projectiles
  for (const p of State.projectiles) p.draw(gameCtx);

  // Draw particles (on fx canvas)
  for (const p of State.particles) {
    const a = p.life / p.maxLife;
    fxCtx.globalAlpha = a;
    fxCtx.fillStyle = p.color;
    fxCtx.beginPath();
    fxCtx.arc(p.x, p.y, p.size * a, 0, TAU);
    fxCtx.fill();
  }
  fxCtx.globalAlpha = 1;

  // Draw effects
  for (const e of State.effects) {
    const img = Assets.get(e.type);
    const t = 1 - e.life / e.maxLife; // 0 -> 1
    const alpha = e.life / e.maxLife;
    fxCtx.save();
    fxCtx.translate(e.x, e.y);
    let scale = e.scale;
    if (e.type === 'explosion') {
      scale = e.scale * (0.5 + t * 1.3);
    } else if (e.type === 'levelup') {
      scale = e.scale * (0.5 + t * 1.5);
    } else if (e.type === 'attackeffect') {
      scale = e.scale * (0.3 + t * 0.7);
    } else if (e.type === 'heal' || e.type === 'rage') {
      scale = e.scale * (0.4 + t * 1.2);
    }
    fxCtx.globalAlpha = alpha;
    const size = 80 * scale;
    if (img) {
      fxCtx.drawImage(img, -size/2, -size/2, size, size);
    } else {
      // Fallback radial
      const colors = { explosion: '#ff7030', levelup: '#ffd040', attackeffect: '#ffee80', heal: '#50ff80', rage: '#ff5050' };
      const grad = fxCtx.createRadialGradient(0, 0, 0, 0, 0, size/2);
      grad.addColorStop(0, colors[e.type] || '#fff');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      fxCtx.fillStyle = grad;
      fxCtx.beginPath();
      fxCtx.arc(0, 0, size/2, 0, TAU);
      fxCtx.fill();
    }
    fxCtx.restore();
  }
  fxCtx.globalAlpha = 1;

  // Floating text
  for (const t of State.floatingTexts) {
    fxCtx.globalAlpha = Math.min(1, t.life);
    fxCtx.font = `bold ${t.size}px Trebuchet MS, sans-serif`;
    fxCtx.textAlign = 'center';
    fxCtx.textBaseline = 'middle';
    fxCtx.fillStyle = 'rgba(0,0,0,0.7)';
    fxCtx.fillText(t.text, t.x + 1, t.y + 1);
    fxCtx.fillStyle = t.color;
    fxCtx.fillText(t.text, t.x, t.y);
  }
  fxCtx.globalAlpha = 1;

  gameCtx.restore();
  fxCtx.restore();
}

/* ============================================================
   15. HUD UPDATES
   ============================================================ */

const hudEls = {
  wave: document.getElementById('hud-wave'),
  level: document.getElementById('hud-level'),
  coins: document.getElementById('hud-coins'),
  hpBar: document.getElementById('hp-bar'),
  hpLabel: document.getElementById('hp-label'),
  xpBar: document.getElementById('xp-bar'),
  bossBar: document.getElementById('boss-bar'),
  bossHpBar: document.getElementById('boss-hp-bar'),
  bossHpLabel: document.getElementById('boss-hp-label'),
  bossName: document.getElementById('boss-name'),
  skillBar: document.getElementById('skill-bar'),
  upgradeList: document.getElementById('upgrade-list'),
  upgradeCoins: document.getElementById('upgrade-coins-display')
};

function updateHUD() {
  hudEls.wave.textContent = State.wave;
  hudEls.level.textContent = State.level;
  hudEls.coins.textContent = State.coins;
  const p = State.player;
  if (p) {
    const hpPct = clamp(p.hp / p.maxHp, 0, 1);
    hudEls.hpBar.style.width = (hpPct * 100) + '%';
    hudEls.hpLabel.textContent = `${Math.ceil(p.hp)} / ${p.maxHp}`;
    const xpPct = clamp(State.xp / State.xpNeeded, 0, 1);
    hudEls.xpBar.style.width = (xpPct * 100) + '%';
  }
  // Boss bar
  if (State.bossActive && State.boss && !State.boss.dead) {
    hudEls.bossBar.classList.add('active');
    const pct = clamp(State.boss.hp / State.boss.maxHp, 0, 1);
    hudEls.bossHpBar.style.width = (pct * 100) + '%';
    hudEls.bossHpLabel.textContent = Math.ceil(pct * 100) + '%';
    hudEls.bossName.textContent = `WAVE ${State.wave} BOSS`;
  } else {
    hudEls.bossBar.classList.remove('active');
  }
  hudEls.upgradeCoins.textContent = State.coins;
}

function buildSkillBar() {
  hudEls.skillBar.innerHTML = '';
  SKILL_DEFS.forEach(def => {
    const slot = document.createElement('div');
    slot.className = 'skill-slot';
    slot.dataset.id = def.id;
    if (State.level < def.unlockLevel) slot.classList.add('locked');
    else if (State.skillCD[def.id] <= 0) slot.classList.add('ready');

    const icon = document.createElement('div');
    icon.className = 'skill-icon';
    const img = Assets.get(def.id);
    if (img) {
      const im = document.createElement('img');
      im.src = img.src;
      icon.appendChild(im);
    } else {
      icon.style.background = 'rgba(255,140,80,0.3)';
      icon.textContent = def.name[0];
    }
    slot.appendChild(icon);

    const key = document.createElement('div');
    key.className = 'skill-key';
    key.textContent = def.key;
    slot.appendChild(key);

    const cd = document.createElement('div');
    cd.className = 'skill-cd';
    cd.style.display = 'none';
    slot.appendChild(cd);

    slot.addEventListener('click', (e) => {
      e.stopPropagation();
      castSkill(def.id);
    });
    slot.title = `${def.name} — ${def.desc} (Unlocks at LV ${def.unlockLevel})`;

    hudEls.skillBar.appendChild(slot);
  });
}

function updateSkillBar() {
  const slots = hudEls.skillBar.querySelectorAll('.skill-slot');
  slots.forEach(slot => {
    const id = slot.dataset.id;
    const def = SKILL_DEFS.find(s => s.id === id);
    const locked = State.level < def.unlockLevel;
    const cd = State.skillCD[id];
    slot.classList.toggle('locked', locked);
    slot.classList.toggle('ready', !locked && cd <= 0);
    const cdEl = slot.querySelector('.skill-cd');
    if (cd > 0 && !locked) {
      cdEl.style.display = 'flex';
      cdEl.textContent = Math.ceil(cd);
    } else {
      cdEl.style.display = 'none';
    }
  });
}

/* ============================================================
   16. UPGRADE PANEL
   ============================================================ */

const UPGRADE_DEFS = [
  { id: 'damage', name: 'Damage', desc: '+4 damage per level', icon: 'sword', baseCost: 30, costMult: 1.5 },
  { id: 'health', name: 'Max Health', desc: '+25 HP per level', icon: 'heart', baseCost: 25, costMult: 1.45 },
  { id: 'speed', name: 'Attack Speed', desc: '+12% speed per level', icon: 'lightning', baseCost: 40, costMult: 1.6 },
  { id: 'crit', name: 'Crit Chance', desc: '+4% crit per level', icon: 'star', baseCost: 50, costMult: 1.65 },
  { id: 'critDmg', name: 'Crit Damage', desc: '+20% crit dmg per level', icon: 'burst', baseCost: 55, costMult: 1.7 }
];

const UPGRADE_ICONS = {
  sword: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.92 5L5 6.92 14.5 16.41V19h2.59l3-3-1.59-1.59-1 1-2-2 1-1L13.5 11l-1 1-2-2 1-1L9.92 7.5l-1 1-2-2L6.92 5zM17 14.41l-1 1L18.59 18l1-1L17 14.41z"/></svg>',
  heart: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6.5 5c2 0 3.5 1 4.5 2.5C12 6 13.5 5 15.5 5 19.5 5 21 9 19.5 12c-2.5 4.5-9.5 9-9.5 9z"/></svg>',
  lightning: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 21l8-12h-6l2-8-8 12h6l-2 8z"/></svg>',
  star: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>',
  burst: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2 5 5-2-2 5 5 2-5 2 2 5-5-2-2 5-2-5-5 2 2-5-5-2 5-2-2-5 5 2z"/></svg>'
};

function buildUpgradePanel() {
  hudEls.upgradeList.innerHTML = '';
  UPGRADE_DEFS.forEach(def => {
    const item = document.createElement('div');
    item.className = 'upgrade-item';
    const lvl = State.save.upgrades[def.id];
    const cost = Math.floor(def.baseCost * Math.pow(def.costMult, lvl));
    item.innerHTML = `
      <div class="upgrade-icon">${UPGRADE_ICONS[def.icon]}</div>
      <div class="upgrade-info">
        <div class="upgrade-name">${def.name}</div>
        <div class="upgrade-desc">${def.desc}</div>
        <div class="upgrade-level">Level ${lvl}</div>
      </div>
      <button class="upgrade-buy" data-id="${def.id}">${cost}</button>
    `;
    hudEls.upgradeList.appendChild(item);
  });
  // Wire up buy buttons
  hudEls.upgradeList.querySelectorAll('.upgrade-buy').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      buyUpgrade(btn.dataset.id);
    });
  });
  refreshUpgradePanel();
}

function refreshUpgradePanel() {
  hudEls.upgradeCoins.textContent = State.coins;
  const items = hudEls.upgradeList.querySelectorAll('.upgrade-item');
  items.forEach((item, i) => {
    const def = UPGRADE_DEFS[i];
    const lvl = State.save.upgrades[def.id];
    const cost = Math.floor(def.baseCost * Math.pow(def.costMult, lvl));
    const btn = item.querySelector('.upgrade-buy');
    btn.textContent = cost;
    btn.disabled = State.coins < cost;
    item.querySelector('.upgrade-level').textContent = `Level ${lvl}`;
  });
}

function buyUpgrade(id) {
  const def = UPGRADE_DEFS.find(d => d.id === id);
  const lvl = State.save.upgrades[id];
  const cost = Math.floor(def.baseCost * Math.pow(def.costMult, lvl));
  if (State.coins < cost) return;
  State.coins -= cost;
  State.save.upgrades[id]++;
  saveProgress();
  if (State.player) {
    State.player.recalculateStats();
    State.player.hp = Math.min(State.player.maxHp, State.player.hp);
  }
  buildUpgradePanel();
  Audio.coin();
  showToast(`${def.name} UPGRADED!`, 'levelup');
}

/* ============================================================
   17. TOAST NOTIFICATIONS
   ============================================================ */

function showToast(text, type = '') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = text;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2100);
}

/* ============================================================
   18. GAME FLOW
   ============================================================ */

function startGame() {
  Audio.init();
  Audio.resume();
  State.running = true;
  State.paused = false;
  State.gameOver = false;
  State.inMenu = false;
  State.enemies = [];
  State.projectiles = [];
  State.pickups = [];
  State.particles = [];
  State.floatingTexts = [];
  State.effects = [];
  State.coinsEarnedThisRun = 0;
  State.kills = 0;
  State.xp = 0;
  State.xpNeeded = 50;
  State.level = State.save.playerLevel;
  State.coins = State.save.coins;
  State.wave = 0;
  State.waveActive = false;
  State.waveBreakTimer = 1.2;
  State.bossActive = false;
  State.boss = null;
  State.rageTimer = 0;
  for (const k in State.skillCD) State.skillCD[k] = 0;

  State.player = new Player();
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  buildSkillBar();
  buildUpgradePanel();
  updateHUD();
}

function triggerGameOver() {
  if (State.gameOver) return;
  State.gameOver = true;
  State.running = false;
  Audio.gameover();
  saveProgress();
  // Spawn explosion on player
  spawnEffect('explosion', State.player.x, State.player.y, 2);
  shake(15, 0.8);
  setTimeout(() => {
    document.getElementById('go-wave').textContent = State.wave;
    document.getElementById('go-coins').textContent = State.coinsEarnedThisRun;
    document.getElementById('go-kills').textContent = State.kills;
    document.getElementById('go-level').textContent = State.level;
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('gameover-screen').classList.remove('hidden');
  }, 800);
}

function returnToMenu() {
  State.running = false;
  State.paused = false;
  State.gameOver = false;
  State.inMenu = true;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  updateMenuStats();
}

function togglePause() {
  if (!State.running || State.gameOver) return;
  State.paused = !State.paused;
  document.getElementById('pause-overlay').classList.toggle('active', State.paused);
}

function updateMenuStats() {
  document.getElementById('menu-high-wave').textContent = State.save.highestWave;
  document.getElementById('menu-player-level').textContent = State.save.playerLevel;
}

/* ============================================================
   19. MAIN LOOP
   ============================================================ */

function loop(timestamp) {
  if (!State.lastTime) State.lastTime = timestamp;
  let dt = (timestamp - State.lastTime) / 1000;
  State.lastTime = timestamp;
  dt = Math.min(dt, 0.05); // Clamp to prevent huge jumps

  update(dt);
  render();

  requestAnimationFrame(loop);
}

/* ============================================================
   20. EVENT LISTENERS / UI WIRING
   ============================================================ */

function setupEventListeners() {
  // Menu buttons
  document.getElementById('start-btn').addEventListener('click', () => {
    Audio.init(); Audio.resume();
    startGame();
  });
  document.getElementById('continue-btn').addEventListener('click', () => {
    Audio.init(); Audio.resume();
    startGame();
  });
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('Reset all progress? This cannot be undone.')) {
      resetProgress();
    }
  });
  document.getElementById('credits-btn').addEventListener('click', () => {
    const t = document.getElementById('credits-text');
    t.style.display = t.style.display === 'none' ? 'block' : 'none';
  });

  // Game over buttons
  document.getElementById('play-again-btn').addEventListener('click', () => startGame());
  document.getElementById('menu-btn-go').addEventListener('click', () => returnToMenu());

  // HUD buttons
  document.getElementById('pause-btn').addEventListener('click', togglePause);
  document.getElementById('resume-btn').addEventListener('click', togglePause);
  document.getElementById('quit-btn').addEventListener('click', () => {
    State.paused = false;
    document.getElementById('pause-overlay').classList.remove('active');
    returnToMenu();
  });

  document.getElementById('mute-btn').addEventListener('click', () => {
    Audio.muted = !Audio.muted;
    const icon = document.getElementById('mute-icon');
    if (Audio.muted) {
      icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM16 4.5v2.06c2.89.86 5 3.54 5 6.44s-2.11 5.58-5 6.44v2.06c4-0.93 7-4.49 7-8.5s-3-7.57-7-8.5z" opacity="0.3"/><path d="M16 4.5v2.06c2.89.86 5 3.54 5 6.44s-2.11 5.58-5 6.44v2.06c4-0.93 7-4.49 7-8.5s-3-7.57-7-8.5zM3 9v6h4l5 5V4L7 9H3z"/>';
    } else {
      icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>';
    }
  });

  // Upgrade button & panel
  document.getElementById('upgrade-btn').addEventListener('click', () => {
    const panel = document.getElementById('upgrade-panel');
    panel.classList.toggle('active');
    if (panel.classList.contains('active')) {
      buildUpgradePanel();
      State.paused = true;
    } else {
      State.paused = false;
    }
  });
  document.getElementById('upgrade-close').addEventListener('click', () => {
    document.getElementById('upgrade-panel').classList.remove('active');
    State.paused = false;
  });

  // Keyboard
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
      togglePause();
    } else if (e.key === 'u' || e.key === 'U') {
      const panel = document.getElementById('upgrade-panel');
      panel.classList.toggle('active');
      State.paused = panel.classList.contains('active');
      if (panel.classList.contains('active')) buildUpgradePanel();
    } else if (e.key === 'm' || e.key === 'M') {
      document.getElementById('mute-btn').click();
    }
    // Skill hotkeys
    const skillKeys = { '1': 'fireball', '2': 'iceblast', '3': 'lightning', '4': 'heal', '5': 'rage' };
    if (skillKeys[e.key]) castSkill(skillKeys[e.key]);
  });

  // Prevent context menu on canvas
  [gameCanvas, fxCanvas].forEach(c => c.addEventListener('contextmenu', e => e.preventDefault()));

  // Resume audio on first interaction
  document.addEventListener('click', () => Audio.resume(), { once: true });
  document.addEventListener('touchstart', () => Audio.resume(), { once: true });
}

/* ============================================================
   21. INITIALIZATION
   ============================================================ */

function init() {
  loadSave();
  updateMenuStats();
  setupEventListeners();
  resizeCanvas();
  Assets.load(() => {
    drawBackground();
    document.getElementById('loading').classList.add('hidden');
  });
  requestAnimationFrame(loop);
}

// Wait for DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
</body>
